function $(id) { return document.getElementById(id); }
function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
}
function setStatus(text, kind = "loading") {
  const el = $("status");
  el.textContent = text;
  el.className = "status " + kind;
}
function normalizeCPF(cpf) { return String(cpf || "").replace(/\D/g, ""); }
function getTokenFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return String(params.get("token") || params.get("t") || "").trim();
}
function getCpfFromUrl() {
  if (window.__patientFormAccess?.cpf) return normalizeCPF(window.__patientFormAccess.cpf);
  const params = new URLSearchParams(window.location.search);
  const legacyCpf = params.get("cpf");
  if (legacyCpf) return normalizeCPF(legacyCpf);
  const raw = window.location.search.replace("?", "").trim();
  if (/^\d{11}$/.test(raw)) return raw;
  return "";
}
function getTestCodeFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("form") || params.get("code") || FORM_CONFIG.code;
}
function redirectToAreaPaciente(cpf) {
  const token = getTokenFromUrl();
  if (token) {
    window.location.href = AREA_PACIENTE_URL + "?token=" + encodeURIComponent(token);
    return;
  }
  const cpfDestino = normalizeCPF(cpf || getCpfFromUrl());
  window.location.href = cpfDestino ? AREA_PACIENTE_URL + "?" + cpfDestino : AREA_PACIENTE_URL;
}
function isObject(v) { return v && typeof v === "object" && !Array.isArray(v); }
function containsTestCode(jsonb, testCode) {
  if (!jsonb) return false;
  if (typeof jsonb === "string") return jsonb === testCode;
  if (Array.isArray(jsonb)) {
    return jsonb.some(item => {
      if (typeof item === "string") return item === testCode;
      if (isObject(item)) return item.code === testCode || item.test_code === testCode || item.id === testCode || containsTestCode(item, testCode);
      return false;
    });
  }
  if (isObject(jsonb)) {
    if (Object.prototype.hasOwnProperty.call(jsonb, testCode)) {
      const value = jsonb[testCode];
      return value !== false && value !== null && value !== undefined;
    }
    if (jsonb.code === testCode || jsonb.test_code === testCode || jsonb.id === testCode) return true;
    return Object.values(jsonb).some(v => containsTestCode(v, testCode));
  }
  return false;
}
function isTestLiberado(testsLiberados, testCode) {
  if (!containsTestCode(testsLiberados, testCode)) return false;
  if (isObject(testsLiberados) && Object.prototype.hasOwnProperty.call(testsLiberados, testCode)) {
    const v = testsLiberados[testCode];
    if (typeof v === "boolean") return v;
    if (isObject(v) && "liberado" in v) return Boolean(v.liberado);
    if (typeof v === "string") return !["false", "0", "nao", "não"].includes(v.toLowerCase());
    return Boolean(v);
  }
  return true;
}
function isTestFeito(testsFeitos, testCode) {
  if (!containsTestCode(testsFeitos, testCode)) return false;
  if (isObject(testsFeitos) && Object.prototype.hasOwnProperty.call(testsFeitos, testCode)) {
    const v = testsFeitos[testCode];
    if (typeof v === "boolean") return v;
    if (isObject(v) && "feito" in v) return Boolean(v.feito);
    if (typeof v === "string") return !["false", "0", "nao", "não"].includes(v.toLowerCase());
    return Boolean(v);
  }
  return true;
}
function normalizeTestsFeitosForSave(current) {
  const out = {};
  if (!current) return out;
  if (typeof current === "string") {
    out[current] = { feito: true };
    return out;
  }
  if (Array.isArray(current)) {
    current.forEach(item => {
      if (typeof item === "string") out[item] = { feito: true };
      else if (isObject(item)) {
        const code = item.code || item.test_code || item.id;
        if (code) out[code] = { ...item, feito: ("feito" in item) ? Boolean(item.feito) : true };
      }
    });
    return out;
  }
  if (isObject(current)) {
    Object.entries(current).forEach(([key, value]) => {
      if (typeof value === "boolean") out[key] = { feito: value };
      else if (typeof value === "string") out[key] = { feito: !["false", "0", "nao", "não"].includes(value.toLowerCase()) };
      else if (isObject(value)) out[key] = { ...value };
      else out[key] = { feito: Boolean(value) };
    });
  }
  return out;
}
function buildUpdatedTestsFeitos(currentTestsFeitos, testCode, submittedAtIso) {
  const next = normalizeTestsFeitosForSave(currentTestsFeitos);
  next[testCode] = { ...(isObject(next[testCode]) ? next[testCode] : {}), feito: true, submitted_at: submittedAtIso };
  return next;
}
async function getPatientFormAccessByToken() {
  const token = getTokenFromUrl();
  const testCode = getTestCodeFromUrl();
  if (!token || !testCode) return { data: null, error: new Error("Link inválido ou formulário não informado.") };
  if (window.__patientFormAccess && window.__patientFormAccess.form_code === testCode) return { data: window.__patientFormAccess, error: null };
  if (!window.__patientFormAccessPromise) {
    window.__patientFormAccessPromise = supabaseClient.rpc("get_public_patient_form_access", {
      p_token: token,
      p_form_code: testCode
    }).then(({ data, error }) => {
      if (error) return { data: null, error };
      const row = Array.isArray(data) ? data[0] : data;
      window.__patientFormAccess = row || null;
      return { data: row || null, error: null };
    });
  }
  return window.__patientFormAccessPromise;
}
function installPatientTokenAccessShim() {
  if (!supabaseClient || supabaseClient.__patientTokenAccessShim) return;
  const originalFrom = supabaseClient.from.bind(supabaseClient);
  supabaseClient.from = function(table) {
    if (table !== "patients") return originalFrom(table);
    const selectBuilder = {
      select() { return this; },
      eq() { return this; },
      in() { return this; },
      limit() { return this; },
      order() { return this; },
      maybeSingle() { return getPatientFormAccessByToken(); },
      single() { return getPatientFormAccessByToken(); },
      async then(resolve, reject) {
        try {
          const result = await getPatientFormAccessByToken();
          return resolve(result);
        } catch (err) {
          if (reject) return reject(err);
          throw err;
        }
      }
    };
    return {
      select() { return selectBuilder; },
      update() { return { eq: async () => ({ data: null, error: null }) }; }
    };
  };
  supabaseClient.__patientTokenAccessShim = true;
}
async function validarAcessoAoTeste() {
  const token = getTokenFromUrl();
  const cpf = getCpfFromUrl();
  const testCode = getTestCodeFromUrl();
  let data = null;
  let error = null;
  if (token) {
    installPatientTokenAccessShim();
    ({ data, error } = await getPatientFormAccessByToken());
  } else {
    if (!cpf || cpf.length !== 11) throw new Error("Link inválido ou expirado. Abra o formulário pela área do paciente.");
    ({ data, error } = await supabaseClient.from("patients").select("cpf, nome, tests_liberados, tests_feitos").eq("cpf", cpf).maybeSingle());
  }
  if (error) {
    console.error(error);
    throw new Error("Erro ao consultar a base de dados.");
  }
  if (!data) throw new Error("Paciente não encontrado.");
  if (!isTestLiberado(data.tests_liberados, testCode)) throw new Error("Teste não liberado.");
  if (isTestFeito(data.tests_feitos, testCode)) {
    redirectToAreaPaciente(data.cpf || cpf);
    return null;
  }
  return data;
}

function fieldName(prefix, n) { return prefix + "_" + String(n).padStart(2, "0"); }
function createRadioGroup(name, options, required) {
  const group = document.createElement("div");
  group.className = "choice-group";
  options.forEach((opt, index) => {
    const id = name + "_" + index;
    const wrap = document.createElement("label");
    wrap.className = "choice-item";
    wrap.setAttribute("for", id);
    const input = document.createElement("input");
    input.type = "radio";
    input.name = name;
    input.id = id;
    input.value = opt.value;
    input.required = !!required && index === 0;
    const span = document.createElement("span");
    span.textContent = opt.label;
    wrap.appendChild(input);
    wrap.appendChild(span);
    group.appendChild(wrap);
  });
  return group;
}
function row(labelText, control, fieldNameValue) {
  const rowEl = document.createElement("div");
  rowEl.className = "row";
  if (fieldNameValue) rowEl.dataset.field = fieldNameValue;
  const label = document.createElement("div");
  label.className = "field-label";
  label.textContent = labelText;
  rowEl.appendChild(label);
  rowEl.appendChild(control);
  return rowEl;
}
function scaleOptions() {
  const opts = FORM_CONFIG.scaleLabels.map((label, index) => ({ value: String(index), label }));
  if (FORM_CONFIG.allowNotObserved) opts.push({ value: "NO", label: "N/O - Não observado / sem informação suficiente" });
  return opts;
}
function areaRatingOptions() {
  return [
    { value: "0", label: "Não aparece" },

    { value: "2", label: "Aparece moderadamente" },

    { value: "4", label: "Aparece muito" }
  ];
}
function renderForm() {
  const form = $("testForm");
  form.innerHTML = "";
  $("metaInfo").innerHTML = '<span class="pill">Código: ' + escapeHtml(FORM_CONFIG.code) + '</span><span class="pill">Escala 0 a 4</span>' + (FORM_CONFIG.allowNotObserved ? '<span class="pill">N/O não entra na pontuação</span>' : "");

  const main = document.createElement("div");
  main.className = "section";
  main.innerHTML = "<h2>Itens principais</h2><p class='muted'>Some apenas os itens 1 a 30 para a pontuação principal.</p>";
  form.appendChild(main);
  FORM_CONFIG.mainItems.forEach((text, index) => {
    const number = index + 1;
    const name = fieldName("item", number);
    form.appendChild(row(number + ". " + text, createRadioGroup(name, scaleOptions(), true), name));
  });

  const mod = document.createElement("div");
  mod.className = "section";
  mod.innerHTML = "<h2>Itens moduladores</h2><p class='muted'>Os itens 31 a 36 não entram na pontuação principal; indicam custo emocional, camuflagem, assincronia e adaptação.</p>";
  form.appendChild(mod);
  FORM_CONFIG.modItems.forEach((text, index) => {
    const number = index + 31;
    const name = fieldName("mod", number);
    form.appendChild(row(number + ". " + text, createRadioGroup(name, scaleOptions(), true), name));
  });

  const open = document.createElement("div");
  open.className = "section";
  open.innerHTML = "<h2>Perguntas abertas obrigatórias</h2>";
  form.appendChild(open);
  FORM_CONFIG.openQuestions.forEach((text, index) => {
    const name = fieldName("aberta", index + 1);
    const textarea = document.createElement("textarea");
    textarea.name = name;
    textarea.required = true;
    form.appendChild(row((index + 1) + ". " + text, textarea, name));
  });

  const area = document.createElement("div");
  area.className = "section";
  area.innerHTML = "<h2>Áreas de expressão do potencial</h2><p class='muted'>Marque onde os indicadores aparecem com mais força.</p>";
  form.appendChild(area);
  FORM_CONFIG.areaOptions.forEach((text, index) => {
    const name = fieldName("area", index + 1);
    form.appendChild(row(text, createRadioGroup(name, areaRatingOptions(), true), name));
  });

  const button = document.createElement("button");
  button.type = "submit";
  button.id = "submitBtn";
  button.textContent = "Enviar";
  form.appendChild(button);
}
function formDataToObject(formEl) {
  const data = new FormData(formEl);
  const out = {};
  for (const [key, value] of data.entries()) out[key] = value;
  return out;
}
function scoreValue(value) {
  if (value === "NO" || value === "" || value === undefined || value === null) return null;
  const numberValue = Number(value);
  return Number.isFinite(numberValue) ? numberValue : null;
}
function classify(score, ranges) {
  const found = ranges.find(r => score >= r.min && score <= r.max);
  return found || ranges[ranges.length - 1];
}
function sumRange(answers, prefix, start, end) {
  let total = 0;
  let answered = 0;
  let notObserved = 0;
  for (let i = start; i <= end; i++) {
    const raw = answers[fieldName(prefix, i)];
    if (raw === "NO") {
      notObserved++;
      continue;
    }
    const value = scoreValue(raw);
    if (value === null) continue;
    total += value;
    answered++;
  }
  return { total, answered, notObserved };
}
function buildClinicalInterpretation(total, blocks, modulator) {
  const byKey = {};
  blocks.forEach(block => { byKey[block.key] = block; });
  const notes = [];
  let label = "Perfil pouco sugestivo de AH/SD";
  let text = "O resultado sugere baixa presença de indicadores consistentes de altas habilidades/superdotação no questionário aplicado. Há características pontuais, mas elas não aparecem de forma suficientemente integrada entre habilidade acima da média, criatividade e comprometimento com a tarefa.";

  if (total >= 102 && byKey.habilidade.total >= 19 && byKey.aprendizagem.total >= 19 && byKey.criatividade.total >= 19 && byKey.comprometimento.total >= 14) {
    label = "Perfil fortemente sugestivo de AH/SD";
    text = "O resultado aponta forte presença de indicadores de altas habilidades/superdotação. O padrão sugere funcionamento marcado por aprendizagem rápida, profundidade, criatividade, autonomia intelectual e envolvimento seletivo/intenso em áreas de interesse. A conclusão deve considerar a convergência entre múltiplas fontes e a análise clínica do funcionamento global.";
  } else if (total >= 84 && byKey.habilidade.total >= 18 && byKey.criatividade.total >= 18 && byKey.comprometimento.total >= 14) {
    label = "Perfil sugestivo de AH/SD";
    text = "O resultado é sugestivo de indicadores de altas habilidades/superdotação, especialmente pela combinação entre habilidade acima da média, criatividade e envolvimento em tarefas de interesse. O perfil deve ser integrado a dados de anamnese, histórico escolar/profissional, desempenho cognitivo, produções concretas e relatos de outras fontes.";
  } else if (total >= 60 || blocks.some(block => block.total >= 23)) {
    label = "Potencial específico ou contextual";
    text = "O resultado sugere presença de potencial específico ou contextual, com sinais mais evidentes em determinadas áreas de interesse. O perfil não deve ser interpretado apenas pela média geral, pois há possibilidade de talento localizado, expressão seletiva e influência de fatores emocionais, escolares, familiares ou executivos.";
  }

  if (byKey.habilidade.total >= 19 && byKey.comprometimento.total <= 13) {
    notes.push("Há discrepância entre habilidade elevada e comprometimento mais baixo; investigue camuflagem, baixa oportunidade de expressão, ambiente pouco estimulante, dupla excepcionalidade, TDAH, TEA, ansiedade, depressão ou diferença entre capacidade e desempenho real.");
  }
  if (modulator.total >= 14) {
    notes.push("Os itens moduladores sugerem custo emocional, perfeccionismo, sensação de diferença, frustração, camuflagem ou dificuldade de adaptação associados ao potencial.");
  }

  return { label, interpretation: text, notes };
}
function calculateScores(answers) {
  const blocks = BLOCKS.map(block => {
    const scored = sumRange(answers, "item", block.start, block.end);
    const classification = classify(scored.total, BLOCK_RANGES);
    return { ...block, ...scored, classification: classification.label };
  });
  const mainTotal = blocks.reduce((sum, block) => sum + block.total, 0);
  const mainAnswered = blocks.reduce((sum, block) => sum + block.answered, 0);
  const mainNotObserved = blocks.reduce((sum, block) => sum + block.notObserved, 0);
  const totalClassification = classify(mainTotal, TOTAL_RANGES);
  const modScored = sumRange(answers, "mod", 31, 36);
  const modClassification = classify(modScored.total, MOD_RANGES);
  const modulator = { ...modScored, classification: modClassification.label, interpretation: modClassification.interpretation };
  const clinical = buildClinicalInterpretation(mainTotal, blocks, modulator);
  const areas = FORM_CONFIG.areaOptions.map((label, index) => {
    const value = scoreValue(answers[fieldName("area", index + 1)]) || 0;
    return { label, value };
  });
  const strongAreas = areas.filter(area => area.value >= 3);

  return {
    mainTotal,
    mainAnswered,
    mainNotObserved,
    totalClassification: totalClassification.label,
    totalInterpretation: totalClassification.interpretation,
    blocks,
    modulator,
    clinical,
    areas,
    strongAreas
  };
}
function optionLabelForValue(value) {
  if (value === "NO") return "N/O - Não observado / sem informação suficiente";
  const index = Number(value);
  return FORM_CONFIG.scaleLabels[index] || String(value ?? "");
}
function areaLabelForValue(value) {
  const labels = ["Não aparece", "Aparece pouco", "Aparece moderadamente", "Aparece bastante", "Aparece muito"];
  return labels[Number(value)] || String(value ?? "");
}
function buildReadableResults(answers, scores) {
  const results = [];
  FORM_CONFIG.mainItems.forEach((text, index) => {
    const number = index + 1;
    const raw = answers[fieldName("item", number)];
    results.push({ secao: "Itens principais", numero: number, pergunta: text, resposta: optionLabelForValue(raw), pontuacao: scoreValue(raw) });
  });
  FORM_CONFIG.modItems.forEach((text, index) => {
    const number = index + 31;
    const raw = answers[fieldName("mod", number)];
    results.push({ secao: "Itens moduladores", numero: number, pergunta: text, resposta: optionLabelForValue(raw), pontuacao: scoreValue(raw) });
  });
  FORM_CONFIG.openQuestions.forEach((text, index) => {
    const raw = answers[fieldName("aberta", index + 1)] || "";
    results.push({ secao: "Perguntas abertas", numero: index + 1, pergunta: text, resposta: raw });
  });
  FORM_CONFIG.areaOptions.forEach((text, index) => {
    const raw = answers[fieldName("area", index + 1)];
    results.push({ secao: "Áreas de expressão", numero: index + 1, pergunta: text, resposta: areaLabelForValue(raw), pontuacao: scoreValue(raw) });
  });
  results.push({ secao: "Resumo", pergunta: "Pontuação total", resposta: scores.mainTotal });
  results.push({ secao: "Resumo", pergunta: "Classificação total", resposta: scores.totalClassification });
  results.push({ secao: "Resumo", pergunta: "Classificação clínica", resposta: scores.clinical.label });
  return results;
}
function buildResultsMeta(scores) {
  const meta = [
    { key: "pontuacao_total", label: "Pontuação total", value: scores.mainTotal },
    { key: "classificacao_total", label: "Classificação total", value: scores.totalClassification },
    { key: "interpretacao_total", label: "Interpretação total", value: scores.totalInterpretation },
    { key: "classificacao_clinica", label: "Classificação clínica", value: scores.clinical.label },
    { key: "interpretacao_clinica", label: "Interpretação clínica", value: scores.clinical.interpretation },
    { key: "itens_principais_respondidos", label: "Itens principais pontuados", value: scores.mainAnswered },
    { key: "itens_nao_observados", label: "Itens principais não observados", value: scores.mainNotObserved },
    { key: "moduladores_total", label: "Pontuação dos moduladores", value: scores.modulator.total },
    { key: "moduladores_classificacao", label: "Classificação dos moduladores", value: scores.modulator.classification },
    { key: "moduladores_interpretacao", label: "Interpretação dos moduladores", value: scores.modulator.interpretation },
    { key: "areas_fortes", label: "Áreas com maior expressão", value: scores.strongAreas.map(area => area.label) }
  ];
  scores.blocks.forEach(block => {
    meta.push({ key: "bloco_" + block.key + "_total", label: block.label + " - pontuação", value: block.total });
    meta.push({ key: "bloco_" + block.key + "_classificacao", label: block.label + " - classificação", value: block.classification });
    meta.push({ key: "bloco_" + block.key + "_interpretacao", label: block.label + " - interpretação", value: block.highMeaning });
  });
  scores.clinical.notes.forEach((note, index) => {
    meta.push({ key: "nota_clinica_" + (index + 1), label: "Nota clínica " + (index + 1), value: note });
  });
  scores.areas.forEach((area, index) => {
    meta.push({ key: "area_" + (index + 1), label: area.label, value: area.value });
  });
  return meta;
}
function showSummary(scores) {
  const box = $("summaryBox");
  const blockRows = scores.blocks.map(block => "<li><strong>" + escapeHtml(block.label) + ":</strong> " + block.total + " - " + escapeHtml(block.classification) + "</li>").join("");
  const areaText = scores.strongAreas.length ? scores.strongAreas.map(area => escapeHtml(area.label)).join(", ") : "Nenhuma área com pontuação 3 ou 4.";
  box.style.display = "block";
  box.innerHTML = "<h3>Resumo calculado</h3>" +
    "<p><strong>Total:</strong> " + scores.mainTotal + " - " + escapeHtml(scores.totalClassification) + "</p>" +
    "<p><strong>Classificação clínica:</strong> " + escapeHtml(scores.clinical.label) + "</p>" +
    "<ul>" + blockRows + "</ul>" +
    "<p><strong>Moduladores:</strong> " + scores.modulator.total + " - " + escapeHtml(scores.modulator.classification) + "</p>" +
    "<p><strong>Áreas fortes:</strong> " + areaText + "</p>";
}
function markInvalidRequired(formEl) {
  formEl.querySelectorAll(".row.invalid").forEach(row => row.classList.remove("invalid"));
  const invalid = [];
  formEl.querySelectorAll("[required]").forEach(el => {
    if (!el.checkValidity()) {
      const row = el.closest(".row");
      if (row && !invalid.includes(row)) invalid.push(row);
    }
  });
  invalid.forEach(row => row.classList.add("invalid"));
  return invalid;
}
async function handleSubmit(event) {
  event.preventDefault();
  const formEl = event.currentTarget;
  const invalidRows = markInvalidRequired(formEl);
  if (invalidRows.length) {
    setStatus("Responda todos os campos obrigatórios destacados.", "warn");
    invalidRows[0].scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }
  const submitBtn = $("submitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Enviando...";

  try {
    const token = getTokenFromUrl();
    if (token) installPatientTokenAccessShim();
    const cpf = normalizeCPF(currentCPF || patient?.cpf || getCpfFromUrl());
    const testCode = getTestCodeFromUrl();
    const submittedAt = new Date().toISOString();
    if (!cpf) throw new Error("CPF inválido.");
    if (!patient) throw new Error("Sessão inválida. Recarregue a página.");

    const answers = formDataToObject(formEl);
    const scores = calculateScores(answers);
    showSummary(scores);
    const resultsPayload = buildReadableResults(answers, scores);
    const resultsMetaPayload = buildResultsMeta(scores);

    const { data: patientRow, error: patientError } = await supabaseClient
      .from("patients")
      .select("cpf, tests_liberados, tests_feitos")
      .eq("cpf", cpf)
      .maybeSingle();
    if (patientError) throw new Error("Erro ao consultar paciente.");
    if (!patientRow) throw new Error("CPF não encontrado.");
    if (!isTestLiberado(patientRow.tests_liberados, testCode)) throw new Error("Teste não liberado.");
    if (isTestFeito(patientRow.tests_feitos, testCode)) {
      redirectToAreaPaciente(cpf);
      return;
    }

    const { error: insertError } = await supabaseClient.from("respostas").insert([{
      cpf,
      code: testCode,
      submitted_at: submittedAt,
      results: resultsPayload,
      results_meta: resultsMetaPayload
    }]);
    if (insertError) throw new Error(("Erro ao salvar respostas: " + (insertError.message || "") + " " + (insertError.details || "") + " " + (insertError.hint || "")).trim());

    const nextTestsFeitos = buildUpdatedTestsFeitos(patientRow.tests_feitos, testCode, submittedAt);
    const { error: updateError } = await supabaseClient.from("patients").update({ tests_feitos: nextTestsFeitos }).eq("cpf", cpf);
    if (updateError) throw new Error("Resposta salva, mas falhou ao marcar teste como feito.");

    setStatus("Respostas enviadas com sucesso. Redirecionando...", "ok");
    setTimeout(() => redirectToAreaPaciente(cpf), 900);
  } catch (err) {
    console.error(err);
    setStatus(err.message || "Erro ao enviar respostas.", "err");
    submitBtn.disabled = false;
    submitBtn.textContent = "Tentar enviar novamente";
  }
}

(async function boot() {
  try {
    renderForm();
    $("testForm").addEventListener("submit", handleSubmit);
    const data = await validarAcessoAoTeste();
    if (!data) return;
    patient = data;
    currentCPF = normalizeCPF(data.cpf);
    document.body.classList.add("ok");
    setStatus("Acesso validado. Preencha o questionário.", "ok");
  } catch (err) {
    console.error(err);
    setStatus(err.message || "Falha ao abrir o formulário.", "err");
  }
})();
  </script>
